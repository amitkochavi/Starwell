<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starwell HQ</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230F0F12'/%3E%3Ctext x='50' y='50' dy='.35em' text-anchor='middle' font-family='Georgia,serif' font-weight='700' font-size='62' fill='%23F4F3F0'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,600;6..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0F0F12;--paper:#FBFBFC;--line:#E6E6EA;--soft:#5A5B61;--gold:#9A7B4F;--panel:#0B0B0F;--ok:#1f7a4d;--err:#b3261e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#F4F4F6;color:var(--ink);line-height:1.55;font-size:15px}
.serif{font-family:"Bodoni Moda",Georgia,serif}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--gold)}
textarea{resize:vertical;min-height:84px}
label{display:block;font-size:12px;letter-spacing:.04em;color:var(--soft);margin:0 0 6px;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;border:1px solid var(--ink);border-radius:6px;padding:10px 18px;font-size:14px;font-weight:500}
.btn:hover{opacity:.9}
.btn.ghost{background:transparent;color:var(--ink)}
.btn.sm{padding:6px 12px;font-size:13px}
.btn.danger{background:transparent;border-color:#e3c9c7;color:var(--err)}
.muted{color:var(--soft)}
.hidden{display:none!important}

/* ---- login ---- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--panel);padding:24px}
.card{background:#fff;border-radius:12px;padding:40px;max-width:420px;width:100%;box-shadow:0 30px 80px -40px rgba(0,0,0,.6)}
.card h1{font-size:26px;font-weight:600;margin-bottom:6px}
.lock{width:46px;height:46px;border-radius:10px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:20px}
.note{font-size:13px;margin-top:14px;min-height:18px}
.note.ok{color:var(--ok)} .note.err{color:var(--err)}
.field{margin-bottom:16px}

/* ---- app ---- */
/* left sidebar layout */
.shell{display:flex;align-items:stretch;min-height:100vh}
.side{width:228px;flex:none;background:var(--panel);color:#cdcdd4;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:18px 12px}
.side-brand{font-size:19px;font-weight:600;color:#fff;padding:6px 12px 16px}
.side-nav{display:flex;flex-direction:column;gap:3px;flex:1}
.side-nav .tab{display:block;width:100%;text-align:left;background:none;border:0;padding:11px 14px;border-radius:8px;color:#b4b4bc;font-size:14px;white-space:nowrap}
.side-nav .tab:hover{background:rgba(255,255,255,.06);color:#fff}
.side-nav .tab.active{background:rgba(255,255,255,.11);color:#fff;font-weight:600}
.side-foot{border-top:1px solid #2a2a33;padding-top:14px;margin-top:10px;font-size:12px;color:#9a9aa2;display:flex;flex-direction:column;gap:10px;word-break:break-all}
.side-foot button{align-self:flex-start}
.content{flex:1;min-width:0;padding:24px 30px 80px}
.view{display:none} .view.active{display:block}
@media(max-width:820px){
  .shell{flex-direction:column}
  .side{width:auto;height:auto;position:sticky;top:0;z-index:20;flex-direction:row;align-items:center;gap:6px;padding:8px 10px;overflow-x:auto}
  .side-brand{padding:0 8px 0 4px;font-size:16px;flex:none}
  .side-nav{flex-direction:row;gap:2px;flex:none}
  .side-nav .tab{padding:9px 13px}
  .side-foot{border-top:0;border-left:1px solid #2a2a33;margin:0;padding:0 0 0 10px;flex-direction:row;align-items:center;gap:8px;margin-left:auto}
  .content{padding:18px 16px 60px}
}
.view-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
.view-head h2{font-size:22px;font-weight:600}
iframe.portal{width:100%;height:640px;border:0;display:block;background:#fff;overflow:hidden}

.row{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:12px;display:flex;gap:14px;align-items:flex-start;justify-content:space-between}
.row .meta{font-size:12px;color:var(--soft);margin-top:3px}
.row .ttl{font-weight:600}
.row .acts{display:flex;gap:8px;flex:none}
.tag{display:inline-block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;background:#f0eee9;color:#6b5a3e;border-radius:4px;padding:2px 8px;margin-right:6px}
.empty{color:var(--soft);padding:30px;text-align:center;border:1px dashed var(--line);border-radius:10px}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.kpi-l{font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em}
.kpi-v{font-size:22px;font-weight:600;margin-top:4px}
/* stocks */
.up{color:#1a7a4f}.down{color:#b3261e}
.stk-sum{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stk-card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.stk-card-l{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.05em}
.stk-card-v{font-size:22px;font-weight:600;margin-top:4px}
.stk-card-s{font-size:12px;margin-top:2px}
.stk-grid{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;align-items:start}
.stk-tablewrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:auto}
.stk-table{width:100%;border-collapse:collapse;font-size:13px}
.stk-table th{text-align:right;padding:11px 12px;color:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;background:#fafafa;position:sticky;top:0}
.stk-table th.l{text-align:left}
.stk-table td{padding:9px 12px;border-bottom:1px solid #eee;white-space:nowrap}
.stk-table tbody tr:hover{background:#fafafa}
.stk-table .r{text-align:right}.stk-table .bold{font-weight:600}
.stk-name{display:flex;align-items:center;gap:11px}
.stk-tk{font-weight:600}
.stk-nm{font-size:11px;color:var(--soft);max-width:230px;overflow:hidden;text-overflow:ellipsis}
.stk-sub2{font-size:11px;opacity:.75}
.stk-logo{position:relative;width:34px;height:34px;border-radius:7px;overflow:hidden;background:#f0eee9;display:inline-flex;align-items:center;justify-content:center;flex:none}
.stk-mono{position:absolute;font-size:11px;font-weight:700;color:#6b5a3e}
.stk-logo img{position:relative;width:100%;height:100%;object-fit:contain;background:#fff}
.stk-alloc{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px}
.stk-alloc-h{font-size:13px;font-weight:600;margin-bottom:10px}
.stk-caret{flex:none;width:18px;height:18px;border:none;background:none;cursor:pointer;color:var(--soft);font-size:11px;display:inline-flex;align-items:center;justify-content:center;transition:transform .15s;padding:0}
.stk-caret.open{transform:rotate(90deg)}
.stk-caret.hide{visibility:hidden}
.stk-table tr.stk-master.open{background:#f6f4ef}
.stk-table tr.stk-master{cursor:pointer}
.stk-table tr.stk-child td{background:#faf9f6;border-bottom:1px solid #f0eee9;font-size:12px;color:var(--soft)}
.stk-table tr.stk-child td.stk-acct{padding-left:54px;color:#3a3a3a}
.stk-acct-badge{display:inline-block;font-size:11px;font-weight:500}
.stk-up{background:#fff;border:1px solid var(--line);border-left:3px solid #2b5ea7;border-radius:8px;padding:11px 14px;margin-bottom:14px;font-size:13px}
.stk-up.err{border-left-color:#b5342a}
.stk-up.ok{border-left-color:#1a7a5a}
@media(max-width:980px){.stk-grid{grid-template-columns:1fr}}

/* ---- modal form ---- */
.overlay{position:fixed;inset:0;background:rgba(10,10,14,.55);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto;z-index:40}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;padding:28px}
.modal h3{font-size:19px;font-weight:600;margin-bottom:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal .field{margin-bottom:14px}
.modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}
.cfgwarn{background:#fff4e5;border:1px solid #f0d9a8;color:#7a5a16;padding:12px 16px;border-radius:8px;margin-bottom:18px;font-size:13px}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.card{padding:28px}}
</style>
</head>

<!-- ====================== LOGIN ====================== -->
<section id="login">
  <div class="card">
    <div class="lock">&#128274;</div>
    <h1 class="serif">Starwell HQ</h1>
    <p class="muted" style="margin-bottom:22px">Secure access by one-time code.</p>

    <div id="cfgMissing" class="cfgwarn hidden">
      Supabase is not configured yet. Add your project URL and anon key in the
      <strong>CONFIG</strong> block of this file, then run <code>supabase/schema.sql</code>.
    </div>

    <div id="step-email">
      <div class="field">
        <label for="email">Work email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@starwellholdings.com">
      </div>
      <button class="btn" id="sendBtn" style="width:100%">Send one-time code</button>
    </div>

    <div id="step-code" class="hidden">
      <div class="field">
        <label for="code">6-digit code (check your email)</label>
        <input id="code" inputmode="numeric" autocomplete="one-time-code" placeholder="123456">
      </div>
      <button class="btn" id="verifyBtn" style="width:100%">Verify &amp; sign in</button>
      <button class="btn ghost sm" id="backBtn" style="width:100%;margin-top:10px">Use a different email</button>
    </div>

    <div class="note" id="loginNote"></div>
  </div>
</section>

<!-- ====================== APP ====================== -->
<div id="app" class="hidden">
  <div class="shell">
    <aside class="side">
      <div class="side-brand serif">Starwell HQ</div>
      <nav class="side-nav">
        <button class="tab active" data-view="investments">Investments</button>
        <button class="tab" data-view="stocks">Stocks</button>
        <button class="tab" data-view="news">News</button>
        <button class="tab" data-view="careers">Careers</button>
        <button class="tab" data-view="portfolio">Portfolio</button>
      </nav>
      <div class="side-foot"><span id="whoEmail"></span><button class="btn ghost sm" id="logoutBtn" style="color:#fff;border-color:#3a3a45">Sign out</button></div>
    </aside>
    <main class="content">
      <section class="view active" id="view-investments">
        <div class="view-head"><h2>Investments — Wealth Portal</h2></div>
        <iframe class="portal" id="portalFrame" title="Wealth Portal" scrolling="no"></iframe>
      </section>

      <section class="view" id="view-stocks">
        <div class="view-head" style="align-items:flex-end">
          <div><h2>Stocks</h2><div class="muted" id="stkSub" style="font-size:13px"></div></div>
          <div style="display:flex;gap:8px">
            <label class="btn ghost sm" style="cursor:pointer">⬆ Upload statement<input type="file" id="stkFile" accept=".csv,.txt,.xls,.xlsx" multiple hidden></label>
            <button class="btn ghost sm" id="stkRefresh">↻ Refresh</button>
          </div>
        </div>
        <div id="stkUp" class="stk-up" hidden></div>
        <div id="stocksBox"></div>
      </section>

      <section class="view" id="view-news">
        <div class="view-head"><h2>News</h2><button class="btn" data-add="news">+ Add article</button></div>
        <div id="list-news"></div>
      </section>

      <section class="view" id="view-careers">
        <div class="view-head"><h2>Careers</h2><button class="btn" data-add="careers">+ Add role</button></div>
        <div id="list-careers"></div>
      </section>

      <section class="view" id="view-portfolio">
        <div class="view-head"><h2>Portfolio</h2><button class="btn" data-add="portfolio">+ Add holding</button></div>
        <div id="list-portfolio"></div>
      </section>
    </main>
  </div>
</div>

<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function(){
  "use strict";
  var CFG = window.STARWELL_CONFIG || {};
  var configured = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY);
  var sb = configured ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;
  var $ = function(s,r){return (r||document).querySelector(s);};
  var note = function(msg, kind){var n=$("#loginNote");n.textContent=msg||"";n.className="note "+(kind||"");};
  var esc = function(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});};

  if(!configured){ $("#cfgMissing").classList.remove("hidden"); $("#sendBtn").disabled=true; }

  // ---------- AUTH ----------
  var currentEmail = "";
  $("#sendBtn") && $("#sendBtn").addEventListener("click", async function(){
    var email = $("#email").value.trim().toLowerCase();
    if(!email){ note("Enter your email.","err"); return; }
    this.disabled=true; note("Sending code…");
    var r = await sb.auth.signInWithOtp({ email: email, options:{ shouldCreateUser:true } });
    this.disabled=false;
    if(r.error){ note(r.error.message,"err"); return; }
    currentEmail = email;
    $("#step-email").classList.add("hidden");
    $("#step-code").classList.remove("hidden");
    note("Code sent to "+email+".","ok");
    $("#code").focus();
  });
  $("#backBtn") && $("#backBtn").addEventListener("click", function(){
    $("#step-code").classList.add("hidden"); $("#step-email").classList.remove("hidden"); note("");
  });
  $("#verifyBtn") && $("#verifyBtn").addEventListener("click", async function(){
    var token = $("#code").value.trim();
    if(!token){ note("Enter the 6-digit code.","err"); return; }
    this.disabled=true; note("Verifying…");
    var r = await sb.auth.verifyOtp({ email: currentEmail, token: token, type:"email" });
    this.disabled=false;
    if(r.error){ note(r.error.message,"err"); return; }
    gateOrReject();
  });
  $("#logoutBtn") && $("#logoutBtn").addEventListener("click", async function(){
    await sb.auth.signOut(); location.reload();
  });

  // Confirm the signed-in user is on the members allowlist; otherwise sign out.
  async function gateOrReject(){
    var u = (await sb.auth.getUser()).data.user;
    if(!u){ return; }
    var m = await sb.from("members").select("email").eq("email", u.email).maybeSingle();
    if(m.error || !m.data){
      await sb.auth.signOut();
      $("#step-code").classList.add("hidden"); $("#step-email").classList.remove("hidden");
      note("This account is not authorized for Starwell HQ.","err");
      return;
    }
    enterApp(u.email);
  }

  function enterApp(email){
    $("#login").classList.add("hidden");
    $("#app").classList.remove("hidden");
    $("#whoEmail").textContent = email;
    var pf=document.getElementById("portalFrame");
    if(pf && !pf.getAttribute("src")) pf.setAttribute("src","wealth-portal.html");
    loadAll();
  }

  // ---------- TABS (left sidebar) ----------
  document.querySelectorAll(".tab[data-view]").forEach(function(t){
    t.addEventListener("click", function(){
      document.querySelectorAll(".tab[data-view]").forEach(function(x){x.classList.remove("active");});
      document.querySelectorAll(".view").forEach(function(x){x.classList.remove("active");});
      t.classList.add("active");
      $("#view-"+t.dataset.view).classList.add("active");
      if(t.dataset.view==="investments") setTimeout(fitPortal,60);
      if(t.dataset.view==="stocks") renderStocks();
    });
  });
  var stkRefBtn=document.getElementById("stkRefresh");
  if(stkRefBtn) stkRefBtn.addEventListener("click", function(){ renderStocks(); });

  // ---------- embedded Wealth Portal: size to content (no inner scrollbar) ----------
  function fitPortal(){
    var f=document.getElementById("portalFrame");
    if(!f||!f.contentWindow) return;
    try{ var d=f.contentWindow.document; var h=Math.max(d.body.scrollHeight,d.documentElement.scrollHeight); if(h>0) f.style.height=h+"px"; }catch(e){}
  }
  (function(){
    var f=document.getElementById("portalFrame"); if(!f) return;
    f.addEventListener("load", function(){
      fitPortal();
      try{ new ResizeObserver(fitPortal).observe(f.contentWindow.document.body); }catch(e){}
      var n=0, iv=setInterval(function(){ fitPortal(); if(++n>24) clearInterval(iv); }, 500);
    });
    window.addEventListener("resize", fitPortal);
  })();

  // ---------- Stocks: portfolio tracker (Supabase holdings + live FMP prices/logos) ----------
  var stkChart=null, stkSort={key:"mv",dir:-1}, stkOpen={};
  function stkAcctShort(a){ if(!a) return "Account"; a=String(a);
    var m=a.match(/\.\.\.?\s*(\d{3,})/); if(m) return "····"+m[1];
    return a.length>26?a.slice(0,24)+"…":a; }
  function stkFull(v){ if(v==null||isNaN(v)) return "—"; return (v<0?"-":"")+"$"+Math.abs(v).toLocaleString(undefined,{maximumFractionDigits:0}); }
  function stkMoney(v,sign){ if(v==null||isNaN(v)) return "—"; var s=v<0?"-":(sign&&v>0?"+":""),a=Math.abs(v);
    return s+"$"+(a>=1e6?(a/1e6).toFixed(2)+"M":a>=1e3?(a/1e3).toFixed(1)+"K":a.toFixed(0)); }
  function stkLogo(t){ var sym=t.replace(/\./g,"-");
    return '<span class="stk-logo"><span class="stk-mono">'+esc(t.slice(0,2))+'</span><img src="https://financialmodelingprep.com/image-stock/'+encodeURIComponent(sym)+'.png" alt="" loading="lazy" onerror="this.style.display=\'none\'"></span>'; }
  function stkCard(l,v,pct,dir){ return '<div class="stk-card"><div class="stk-card-l">'+esc(l)+'</div><div class="stk-card-v '+(dir||"")+'">'+v+'</div>'+(pct!=null?'<div class="stk-card-s '+(dir||"")+'">'+(pct>=0?"+":"")+pct.toFixed(2)+'%</div>':"")+'</div>'; }
  function stkTh(l,k,left){ var ar=stkSort.key===k?(stkSort.dir<0?" ↓":" ↑"):""; return '<th data-k="'+k+'" class="'+(left?"l":"r")+'">'+esc(l)+ar+'</th>'; }
  function stkCmp(a,b){ var k=stkSort.key,d=stkSort.dir,av=a[k],bv=b[k]; if(typeof av==="string")return av.localeCompare(bv)*d; return ((av==null?-1e18:av)-(bv==null?-1e18:bv))*d; }

  async function renderStocks(){
    var box=document.getElementById("stocksBox"); if(!box) return;
    box.innerHTML='<div class="muted">Loading holdings…</div>';
    var h=await sb.from("stock_holdings").select("*").order("sort_order",{ascending:true});
    if(h.error){ box.innerHTML='<div class="empty">Holdings aren’t set up yet. Run <code>supabase/stocks.sql</code> in your Supabase project to create and load the table.<br><br><span style="font-size:12px;opacity:.7">'+esc(h.error.message)+'</span></div>'; return; }
    if(!h.data||!h.data.length){ box.innerHTML='<div class="empty">No holdings loaded yet. Run <code>supabase/stocks.sql</code> in your Supabase project to load your positions.</div>'; return; }
    var positions=h.data.filter(function(r){return !r.is_cash;}), cash=h.data.filter(function(r){return r.is_cash;});
    var key=(window.STARWELL_CONFIG||{}).FMP_API_KEY||"", quotes={}, live=false;
    if(key){ try{
      var uniq={}; positions.forEach(function(p){uniq[p.ticker.replace(/\./g,"-")]=1;});
      var syms=Object.keys(uniq);
      // Free FMP plan: one symbol per /stable/quote call (batch endpoints are premium).
      // Fetch each unique ticker; anything restricted/unknown just falls back to statement price.
      async function chunk(list,n,fn){ for(var i=0;i<list.length;i+=n){ await Promise.all(list.slice(i,i+n).map(fn)); } }
      await chunk(syms,8,function(s){
        return fetch("https://financialmodelingprep.com/stable/quote?symbol="+encodeURIComponent(s)+"&apikey="+encodeURIComponent(key))

          .catch(function(){});

    var cashTot=cash.reduce(function(s,c){return s+(+c.market_value_stmt||0);},0);
    // --- consolidate positions by ticker across all accounts ---
    var groups={};

              dchp:(q&&q.changePercentage!=null)?+q.changePercentage:null,dayVal:(q&&q.change!=null)?g.qty*(+q.change):0,

    var totMv=items.reduce(function(s,i){return s+i.mv;},0), totVal=totMv+cashTot,
        totCost=items.reduce(function(s,i){return s+i.cost;},0), totGl=totMv-totCost,

    var dayPct=(totMv-totDay)?totDay/(totMv-totDay)*100:0, glPct=totCost?totGl/totCost*100:0;

    function paint(){

  // ---------- Stocks: upload brokerage statement (Schwab / Fidelity CSV) ----------
  function stkNum(s){ if(s==null) return 0; s=String(s).replace(/^="?|"?$/g,"").replace(/[$,%\s]/g,"").trim();
    if(s===""||s==="--"||/^N\/A$/i.test(s)||/incomplete/i.test(s)) return 0; var n=parseFloat(s); return isNaN(n)?0:n; }
  function stkClean(s){ return s==null?"":String(s).replace(/^="?|"?$/g,"").trim(); }
  function parseCSV(text){ if(window.Papa){ var r=Papa.parse(text,{skipEmptyLines:true}); return r.data; }
    return text.split(/\r?\n/).filter(function(l){return l.trim();}).map(function(l){
      var out=[],cur="",q=false; for(var i=0;i<l.length;i++){var c=l[i];
        if(c==='"'){ if(q&&l[i+1]==='"'){cur+='"';i++;} else q=!q; }
        else if(c===","&&!q){out.push(cur);cur="";} else cur+=c; } out.push(cur); return out; }); }

  // Charles Schwab "Positions" export
  function parseSchwab(rows){
    var acct="Account", hdr=-1, sym=0,desc=1,qty=2,mkt=5,cost=8;
    for(var r=0;r<rows.length;r++){
      var first=stkClean((rows[r][0]||""));
      var m=first.match(/Positions for account (.+?) as of/i); if(m){ acct=m[1].trim(); }
      if(/^symbol$/i.test(first) && rows[r].length>5){ hdr=r;
        rows[r].forEach(function(c,ix){ c=stkClean(c).toLowerCase();
          if(c==="symbol")sym=ix; else if(/description/.test(c))desc=ix;
          else if(/^qty/.test(c))qty=ix; else if(/mkt val|market value/.test(c))mkt=ix;
          else if(/cost basis/.test(c))cost=ix; }); break; }
    }
    if(hdr<0) return null;
    var out=[];
    for(var i=hdr+1;i<rows.length;i++){ var row=rows[i]; var s=stkClean(row[sym]||"");
      if(!s) continue;
      if(/^positions total/i.test(s)) break;
      if(/cash & cash|cash and cash|money market/i.test(s)){
        out.push({ticker:"CASH",name:"Cash & Cash Investments",quantity:0,cost_basis:0,market_value_stmt:stkNum(row[mkt]),is_cash:true}); continue; }
      out.push({ticker:s.toUpperCase(),name:stkClean(row[desc]||s),quantity:stkNum(row[qty]),cost_basis:stkNum(row[cost]),market_value_stmt:stkNum(row[mkt]),is_cash:false});
    }
    return {account:acct,rows:out};
  }

  // Fidelity tax-lot export (aggregates lots per ticker)
  function parseFidelity(rows){
    var hdr=-1, col={};
    for(var r=0;r<rows.length;r++){ var lc=rows[r].map(function(c){return stkClean(c).toLowerCase();});
      if(lc.indexOf("ticker")>=0 && lc.some(function(c){return /federal cost|cost basis/.test(c);})){ hdr=r;
        lc.forEach(function(c,ix){
          if(c==="ticker")col.tk=ix; else if(/account name/.test(c))col.an=ix;
          else if(/asset name|description/.test(c))col.nm=ix; else if(/^quantity/.test(c))col.qty=ix;
          else if(/federal cost|cost basis/.test(c))col.cost=ix; else if(/market value/.test(c))col.mv=ix; }); break; }
    }
    if(hdr<0||col.tk==null) return null;
    var acct="Account", agg={};
    for(var i=hdr+1;i<rows.length;i++){ var row=rows[i]; var tk=stkClean(row[col.tk]||"").toUpperCase();
      if(!tk) continue; if(col.an!=null && stkClean(row[col.an])) acct=stkClean(row[col.an]);
      var g=agg[tk]; if(!g){ g=agg[tk]={ticker:tk,name:stkClean(col.nm!=null?row[col.nm]:tk)||tk,quantity:0,cost_basis:0,market_value_stmt:0,is_cash:false}; }
      g.quantity+=stkNum(row[col.qty]); g.cost_basis+=stkNum(row[col.cost]); g.market_value_stmt+=stkNum(row[col.mv]);
    }
    var out=Object.keys(agg).map(function(k){return agg[k];});
    return {account:acct,rows:out};
  }

  // Fidelity "Holdings Detail" export (As of Date / Asset Type / % of Holdings columns).
  // Money-market/deposit-sweep rows are treated as cash; firm-total rows (blank Account
  // Number) are merged in only to supply cost basis, never to double-count quantity.
  function parseFidelityHoldings(rows){
    var hdr=-1, col={};
    for(var r=0;r<rows.length;r++){ var lc=rows[r].map(function(c){return stkClean(c).toLowerCase();});
      if(lc.indexOf("ticker")>=0 && lc.indexOf("market value")>=0 && lc.some(function(c){return /% of holdings/.test(c);})){ hdr=r;
        lc.forEach(function(c,ix){
          if(c==="ticker")col.tk=ix; else if(/asset name/.test(c))col.nm=ix;
          else if(/asset type/.test(c))col.at=ix; else if(/account number/.test(c))col.acn=ix;
          else if(/account name/.test(c))col.an=ix; else if(/^quantity/.test(c))col.qty=ix;
          else if(/market value/.test(c))col.mv=ix; else if(/federal cost|cost basis/.test(c))col.cost=ix; }); break; }
    }
    if(hdr<0||col.tk==null) return null;
    var account="Account", reals={}, totals={};
    for(var i=hdr+1;i<rows.length;i++){ var row=rows[i]; if(!row) continue;
      var tk=stkClean(row[col.tk]).toUpperCase(), atype=col.at!=null?stkClean(row[col.at]):"";
      var acctno=col.acn!=null?stkClean(row[col.acn]):"", acctname=col.an!=null?stkClean(row[col.an]):"";
      var name=col.nm!=null?stkClean(row[col.nm]):tk, qty=stkNum(row[col.qty]), mv=stkNum(row[col.mv]), cost=col.cost!=null?stkNum(row[col.cost]):0;
      if(acctname) account=acctname;
      var iscash=/cash/i.test(atype);
      if(!tk) continue;
      if(!acctno){ totals[tk]={qty:qty,mv:mv,cost:cost,name:name,iscash:iscash}; }
      else { var d=reals[tk]||(reals[tk]={qty:0,mv:0,cost:0,name:name,iscash:iscash});
        d.qty+=qty; d.mv+=mv; d.cost+=cost; d.name=name; d.iscash=iscash; }
    }
    var keys={}; Object.keys(reals).forEach(function(k){keys[k]=1;}); Object.keys(totals).forEach(function(k){keys[k]=1;});
    var out=[];
    Object.keys(keys).forEach(function(tk){ var d=reals[tk]||totals[tk];
      if(d.cost===0 && totals[tk] && totals[tk].cost) d.cost=totals[tk].cost;
      out.push({ticker:d.iscash?"CASH":tk,name:d.name,quantity:Math.round(d.qty*1e4)/1e4,
        cost_basis:d.iscash?null:Math.round(d.cost*100)/100,market_value_stmt:Math.round(d.mv*100)/100,is_cash:d.iscash}); });
    if(!out.length) return null;
    return {account:account,rows:out};
  }

  function parseStatement(text){
    var rows=parseCSV(text); if(!rows||!rows.length) return null;
    var head=text.slice(0,400);
    if(/Positions for account/i.test(head)) return parseSchwab(rows);
    if(/% of Holdings/i.test(head)) return parseFidelityHoldings(rows);
    if(/\bticker\b/i.test(head) && /federal cost|cost basis/i.test(head)) return parseFidelity(rows);
    // fallback: try all
    return parseSchwab(rows) || parseFidelityHoldings(rows) || parseFidelity(rows);
  }

  // First International Bank of Israel (FIBI) — Hebrew portfolio export (.xlsx).
  // Converts agorot-quoted Israeli securities to USD using the FX implied by the sheet's own USD rows.
  var FIBI_NAMES={'524017':['GILON','Gilon Gov’t Floating Bond'],'1159029':['TASE','Tel Aviv Stock Exchange Ltd'],
    '1157403':['ISCD','Isracard Ltd'],'604611':['LUMI','Bank Leumi'],'662577':['POLI','Bank Hapoalim'],
    '5127725':['MOR-IH','More Investment House Fund'],'5124326':['MOR-YT','More Yeter Fund'],
    '5119466':['MOR-IL','More Israel Equities Fund'],'1148949':['HRL-BNK','Harel Israel Banks Index'],
    '1146570':['KTA35','KSM TA-35 Index ETF']};
  var FIBI_US={'AMZN':'Amazon.com Inc','TSM':'Taiwan Semiconductor ADR','RSP':'Invesco S&P 500 Equal Weight ETF'};
  function fNum(s){ if(s==null) return null; s=String(s).replace(/,/g,"").replace(/[%\s]/g,"").trim();
    if(s===""||s==="--") return null; var n=parseFloat(s); return isNaN(n)?null:n; }
  function isFIBI(rows){ for(var i=0;i<Math.min(rows.length,15);i++){ for(var j=0;j<rows[i].length;j++){
    var c=String(rows[i][j]==null?"":rows[i][j]); if(c.indexOf("נייר")===0||c.indexOf("תיק ני")>=0||c.indexOf("שווי אחזקה")>=0) return true; } } return false; }
  function parseFIBI(rows){
    var H={name:"נייר",sec:"מספר נייר",sym:"סימבול",
      qty:"כמות",ccy:"מטבע",adj:"שער עלות מותאם",
      hvils:"שווי אחזקה בשח",hvccy:"שווי אחזקה במטבע"};
    var hdr=-1,col={};
    for(var i=0;i<rows.length;i++){ var r=rows[i].map(function(c){return String(c==null?"":c).trim();});
      if(r.indexOf(H.name)>=0 && r.indexOf(H.qty)>=0){ hdr=i;
        Object.keys(H).forEach(function(k){ var ix=r.indexOf(H[k]); if(ix>=0) col[k]=ix; }); break; } }
    if(hdr<0||col.name==null) return null;
    var acct="FIBI", cash=0;
    for(var i=0;i<rows.length;i++){ for(var j=0;j<rows[i].length;j++){ var c=String(rows[i][j]==null?"":rows[i][j]);
      var m=c.match(/חשבון[:\s]*([0-9]+)/); if(m) acct="FIBI ..."+m[1].slice(-3);
      if(c.indexOf("יתרה למסחר")>=0){ var nx=fNum(rows[i][j+1]); if(nx!=null) cash=nx; } } }
    var raw=[],fxs=[];
    for(var i=hdr+1;i<rows.length;i++){ var r=rows[i]; var name=String(r[col.name]==null?"":r[col.name]).trim();
      if(!name||name.indexOf("סה\"כ")===0) continue;
      var q=fNum(r[col.qty]), ccy=String(r[col.ccy]==null?"":r[col.ccy]).trim();
      if(q==null||(ccy!=="₪"&&ccy!=="$")) continue;
      var hvils=fNum(r[col.hvils]), hvccy=fNum(r[col.hvccy]);
      if(ccy==="$"&&hvils&&hvccy) fxs.push(hvils/hvccy);
      raw.push({name:name,sec:String(r[col.sec]||"").trim(),sym:String(r[col.sym]||"").trim().toUpperCase(),
        qty:q,adj:fNum(r[col.adj])||0,ccy:ccy,hvils:hvils||0,hvccy:hvccy||0}); }
    var FX=fxs.length?fxs.reduce(function(a,b){return a+b;},0)/fxs.length:0;
    var out=[];
    raw.forEach(function(x){ var tk,nm,cost,mv;
      if(x.ccy==="$"){ tk=x.sym; nm=FIBI_US[tk]||x.name; cost=Math.round(x.qty*x.adj*100)/100; mv=Math.round(x.hvccy*100)/100; }
      else { var mp=FIBI_NAMES[x.sec]; tk=mp?mp[0]:x.sec; nm=(mp?mp[1]:x.name)+" ("+x.sec+")";
        cost=FX?Math.round((x.qty*x.adj/100)/FX*100)/100:0; mv=FX?Math.round(x.hvils/FX*100)/100:0; }
      out.push({ticker:tk,name:nm,quantity:x.qty,cost_basis:cost,market_value_stmt:mv,is_cash:false}); });
    if(cash) out.push({ticker:"CASH",name:"Cash balance for trading",quantity:0,cost_basis:0,market_value_stmt:FX?Math.round(cash/FX*100)/100:cash,is_cash:true});
    if(!out.length) return null;
    return {account:acct,rows:out};
  }

  function stkBanner(cls,msg){ var b=document.getElementById("stkUp"); if(!b)return; b.hidden=false; b.className="stk-up"+(cls?" "+cls:""); b.innerHTML=msg; }

  async function uploadStatements(files){
    var done=[], failed=[];
    for(var fi=0;fi<files.length;fi++){ var f=files[fi];
      stkBanner("", "Reading <strong>"+esc(f.name)+"</strong>… ("+(fi+1)+"/"+files.length+")");
      var parsed=null;
      try{
        if(/\.xlsx?$/i.test(f.name)){
          if(!window.XLSX){ failed.push(f.name+" (spreadsheet reader not loaded)"); continue; }
          var buf=await f.arrayBuffer();
          var wb=XLSX.read(buf,{type:"array"});
          var grid=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:false,defval:""});
          if(isFIBI(grid)) parsed=parseFIBI(grid);
        } else {
          parsed=parseStatement(await f.text());
        }
      }catch(e){ failed.push(f.name+" ("+(e.message||"unreadable")+")"); continue; }
      if(!parsed||!parsed.account||!parsed.rows.length){ failed.push(f.name+" (unrecognized format)"); continue; }
      parsed.rows.forEach(function(r,ix){ r.account=parsed.account; r.sort_order=ix; });
      var del=await sb.from("stock_holdings").delete().eq("account",parsed.account);
      if(del.error){ failed.push(f.name+" — "+del.error.message); continue; }
      var ins=await sb.from("stock_holdings").insert(parsed.rows);
      if(ins.error){ failed.push(f.name+" — "+ins.error.message); continue; }
      done.push(parsed.account+" ("+parsed.rows.filter(function(r){return !r.is_cash;}).length+" positions)");
    }
    var msg="";
    if(done.length) msg+='✓ Updated: '+done.map(esc).join(", ");
    if(failed.length) msg+=(msg?"<br>":"")+'✕ Skipped: '+failed.map(esc).join("; ");
    stkBanner(failed.length?(done.length?"":"err"):"ok", msg||"Nothing to import.");
    if(done.length) await renderStocks();
  }

  (function(){ var fi=document.getElementById("stkFile"); if(!fi) return;
    fi.addEventListener("change", function(){ if(fi.files&&fi.files.length){ uploadStatements(Array.prototype.slice.call(fi.files)); fi.value=""; } });
  })();

      sub:function(r){return [r.category, r.location, r.employment_type, r.active?"open":"closed"].filter(Boolean).join("  ·  ");},
      fields:[
        {k:"title",label:"Role title",t:"text",full:true,req:true},
        {k:"category",label:"Category",t:"text"},
        {k:"location",label:"Location",t:"text"},
        {k:"employment_type",label:"Type (Full-time…)",t:"text"},
        {k:"description",label:"Description",t:"textarea",full:true},
        {k:"apply_url",label:"Apply link (or mailto:)",t:"text",full:true},
        {k:"active",label:"Open / accepting applications",t:"check"},
        {k:"sort_order",label:"Sort order",t:"number"}
      ]
    },
    portfolio: {
      table:"portfolio_companies", order:[["pillar",true],["sort_order",true]],
      title:function(r){return r.name;},
      sub:function(r){return [r.pillar, r.role, r.highlight?"★ homepage":""].filter(Boolean).join("  ·  ");},
      fields:[
        {k:"name",label:"Name",t:"text",full:true,req:true},
        {k:"pillar",label:"Pillar",t:"select",opts:["technology","real-estate","capital"],req:true},
        {k:"role",label:"Role",t:"text"},
        {k:"description",label:"Description",t:"textarea",full:true},
        {k:"website_url",label:"Website URL",t:"text",full:true},
        {k:"logo_url",label:"Logo URL",t:"text",full:true},
        {k:"partner",label:"Partner",t:"text"},
        {k:"location",label:"Location",t:"text"},
        {k:"image_label",label:"Image label (real-estate cards)",t:"text"},
        {k:"highlight",label:"Show in homepage highlights",t:"check"},
        {k:"sort_order",label:"Sort order",t:"number"}
      ]
    }
  };

  function loadAll(){ Object.keys(MODELS).forEach(renderList); }

  async function renderList(key){
    var m = MODELS[key], box = $("#list-"+key);
    box.innerHTML = '<div class="muted">Loading…</div>';
    var q = sb.from(m.table).select("*");
    m.order.forEach(function(o){ q = q.order(o[0], {ascending:o[1]}); });
    var r = await q;
    if(r.error){ box.innerHTML = '<div class="empty">'+esc(r.error.message)+'</div>'; return; }
    if(!r.data.length){ box.innerHTML = '<div class="empty">Nothing yet. Use “Add” to create the first one.</div>'; return; }
    box.innerHTML = r.data.map(function(row){
      return '<div class="row"><div><div class="ttl">'+esc(m.title(row))+'</div>'+
        '<div class="meta">'+esc(m.sub(row))+'</div></div>'+
        '<div class="acts"><button class="btn ghost sm" data-edit="'+key+'" data-id="'+row.id+'">Edit</button>'+
        '<button class="btn danger sm" data-del="'+key+'" data-id="'+row.id+'">Delete</button></div></div>';
    }).join("");
    box._rows = {}; r.data.forEach(function(row){ box._rows[row.id]=row; });
  }

  // add / edit / delete (event delegation)
  document.addEventListener("click", function(e){
    var add=e.target.closest("[data-add]"), ed=e.target.closest("[data-edit]"), del=e.target.closest("[data-del]");
    if(add) openForm(add.dataset.add, null);
    if(ed){ var row=$("#list-"+ed.dataset.edit)._rows[ed.dataset.id]; openForm(ed.dataset.edit, row); }
    if(del) doDelete(del.dataset.del, del.dataset.id);
  });

  function openForm(key, row){
    var m=MODELS[key]; var editing=!!row; row=row||{};
    var html='<div class="overlay"><div class="modal"><h3>'+(editing?"Edit":"Add")+" — "+key+'</h3><div class="grid2">';
    m.fields.forEach(function(f){
      var v = row[f.k]; var id="f_"+f.k;
      var ctl;
      if(f.t==="textarea") ctl='<textarea id="'+id+'">'+esc(v||"")+'</textarea>';
      else if(f.t==="check") ctl='<input type="checkbox" id="'+id+'" style="width:auto" '+(v?"checked":"")+'>';
      else if(f.t==="select") ctl='<select id="'+id+'">'+f.opts.map(function(o){return '<option '+(v===o?"selected":"")+'>'+o+'</option>';}).join("")+'</select>';
      else ctl='<input id="'+id+'" type="'+(f.t==="number"?"number":f.t==="date"?"date":"text")+'" value="'+esc(v==null?"":v)+'">';
      html+='<div class="field" style="grid-column:'+(f.full?"1/-1":"auto")+'"><label for="'+id+'">'+f.label+(f.req?" *":"")+'</label>'+ctl+'</div>';
    });
    html+='</div><div class="actions"><button class="btn ghost" id="cancelF">Cancel</button><button class="btn" id="saveF">Save</button></div>'+
      '<div class="note" id="formNote"></div></div></div>';
    $("#modalRoot").innerHTML=html;
    $("#cancelF").onclick=function(){$("#modalRoot").innerHTML="";};
    $("#saveF").onclick=async function(){
      var rec={};
      for(var i=0;i<m.fields.length;i++){var f=m.fields[i],el=$("#f_"+f.k);
        if(f.t==="check") rec[f.k]=el.checked;
        else if(f.t==="number") rec[f.k]= el.value===""?0:Number(el.value);
        else { var val=el.value.trim(); rec[f.k]= val===""?null:val; }
        if(f.req && (rec[f.k]==null||rec[f.k]==="")){ $("#formNote").className="note err"; $("#formNote").textContent=f.label+" is required."; return; }
      }
      this.disabled=true;
      var res = editing ? await sb.from(m.table).update(rec).eq("id",row.id)
                        : await sb.from(m.table).insert(rec);
      this.disabled=false;
      if(res.error){ $("#formNote").className="note err"; $("#formNote").textContent=res.error.message; return; }
      $("#modalRoot").innerHTML=""; renderList(key);
    };
  }

  async function doDelete(key,id){
    if(!confirm("Delete this item? This cannot be undone.")) return;
    var res = await sb.from(MODELS[key].table).delete().eq("id",id);
    if(res.error){ alert(res.error.message); return; }
    renderList(key);
  }

  // ---------- resume existing session ----------
  if(configured){
    sb.auth.getSession().then(function(r){ if(r.data.session) gateOrReject(); });
  }
})();
</script>
</body>
</html>
